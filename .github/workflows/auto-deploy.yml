name: Auto Deploy on Push

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /Users/leo/WorkBuddy/20260421163042/growth-system
          # 清除代理环境变量（ClashX 代理会导致 git/npm 连接 github.com 不稳定）
          unset HTTP_PROXY HTTPS_PROXY http_proxy https_proxy NO_PROXY no_proxy
          git -c credential.helper='store --file /Users/leo/.git-credentials-growth-system' pull origin main

      - name: Install backend dependencies
        run: |
          cd /Users/leo/WorkBuddy/20260421163042/growth-system
          unset HTTP_PROXY HTTPS_PROXY http_proxy https_proxy NO_PROXY no_proxy
          npm install --prefix backend

      - name: Install frontend dependencies & build
        run: |
          cd /Users/leo/WorkBuddy/20260421163042/growth-system/frontend
          unset HTTP_PROXY HTTPS_PROXY http_proxy https_proxy NO_PROXY no_proxy
          npm install
          npm run build

      - name: Deploy backend (PM2 delete + start)
        run: |
          cd /Users/leo/WorkBuddy/20260421163042/growth-system
          # 配置（含 API Key / JWT_SECRET）统一从 backend/.env 读取，不再在仓库内硬编码密钥
          # app.js 顶部也会 dotenv 加载 backend/.env 作为双保险
          set -a; . backend/.env; set +a
          export NODE_ENV="${NODE_ENV:-production}"
          export DB_DIALECT="${DB_DIALECT:-sqlite}"
          if [ -z "$JWT_SECRET" ]; then echo "❌ backend/.env 缺少 JWT_SECRET，中止部署"; exit 1; fi
          /Users/leo/.npm-global/bin/pm2 delete growth-system 2>/dev/null || true
          /Users/leo/.npm-global/bin/pm2 start backend/src/app.js --name growth-system --update-env

      - name: Verify deployment
        run: |
          sleep 3
          curl -sf --noproxy '*' http://localhost:58931/api/changelog | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Deployed: V{d[\"data\"][\"latestVersion\"]}')" || echo "WARNING: Health check failed"
          /Users/leo/.npm-global/bin/pm2 save
