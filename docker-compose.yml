version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: growth-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-growth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-growth_system}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U growth -d growth_system"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: growth-api
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-growth_system}
      DB_USER: ${POSTGRES_USER:-growth}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      AI_LLM_PROVIDER: ${AI_LLM_PROVIDER:-}
      AI_LLM_API_KEY: ${AI_LLM_API_KEY:-}
      AI_LLM_MODEL: ${AI_LLM_MODEL:-}
      AI_LLM_BASE_URL: ${AI_LLM_BASE_URL:-}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/weekly-reports:/app/weekly-reports

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: growth-web
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
